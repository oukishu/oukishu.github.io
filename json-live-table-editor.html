<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Live Table Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --surface-0: #f1f0eb;
    --surface-1: #f7f6f2;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --border-accent: #378add;
    --bg-accent: #e6f1fb;
    --bg-danger: #fcebeb;
    --border-danger: #f09595;
    --text-danger: #a32d2d;
    --fill-accent: #378add;
    --fill-accent-hover: #185fa5;
    --fill-danger: #e24b4a;
    --fill-danger-hover: #b83535;
    --fill-success: #3b6d11;
    --fill-success-hover: #294f0c;
    --on-accent: #ffffff;
    --radius: 8px;
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface-0: #1a1a18;
      --surface-1: #242422;
      --surface-2: #2e2e2b;
      --text-primary: #ececea;
      --text-secondary: #b4b2a9;
      --text-muted: #888780;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --border-accent: #85b7eb;
      --bg-accent: #042c53;
      --bg-danger: #501313;
      --border-danger: #f09595;
      --text-danger: #f09595;
      --fill-accent: #378add;
      --fill-accent-hover: #85b7eb;
      --fill-danger: #e24b4a;
      --fill-danger-hover: #f09595;
      --fill-success: #97c459;
      --fill-success-hover: #b0dc74;
      --on-accent: #ffffff;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--surface-0);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: .25rem; }
  .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }

  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--surface-1);
    position: relative;
    margin-bottom: 1rem;
  }

  .drop-zone.over { border-color: var(--border-accent); background: var(--bg-accent); }
  .drop-zone p { color: var(--text-secondary); font-size: 14px; }
  .drop-zone p span { color: var(--text-accent); font-weight: 500; }

  .search-bar {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }

  .search-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .search-group input, .search-group select {
    padding: 6px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border-strong);
    background: var(--surface-1);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
  }

  .search-group input { width: 200px; }
  .search-group select { width: 160px; }

  .btn-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }

  button {
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 14px;
    border-radius: var(--radius);
    padding: 8px 18px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .15s, color .15s, border-color .15s, opacity .15s;
    border: none;
  }

  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--fill-accent); color: var(--on-accent); }
  .btn-success { background: var(--fill-success); color: #ffffff; }
  .btn-success:hover:not(:disabled) { background: var(--fill-success-hover); }
  .btn-ghost { background: transparent; border: 0.5px solid var(--border-strong); color: var(--text-secondary); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-1); }
  
  .btn-edit-sm {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
    background: transparent;
    border: 0.5px solid var(--border-accent);
    color: var(--border-accent);
  }
  .btn-edit-sm:hover {
    background: var(--fill-accent);
    color: var(--on-accent);
    border-color: transparent;
  }

  .btn-danger-sm {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
    background: transparent;
    border: 0.5px solid var(--border-danger);
    color: var(--text-danger);
  }
  .btn-danger-sm:hover {
    background: var(--fill-danger);
    color: #ffffff;
    border-color: transparent;
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 1.5rem 0 .5rem;
  }

  .file-status {
    font-size: 13px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    background: var(--surface-1);
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
  }

  .table-container {
    width: 100%;
    overflow-x: auto;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13px;
    table-layout: fixed;
  }

  th, td {
    padding: 12px 14px;
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  th {
    background: var(--surface-1);
    color: var(--text-secondary);
    font-weight: 500;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  th.col-data, td.col-data { max-width: 180px; width: 150px; }
  .col-idx { font-family: var(--font-mono); color: var(--text-muted); width: 60px; }
  .col-key-th, .col-key-td { width: 140px; max-width: 180px; }
  
  .col-hash { 
    font-family: var(--font-mono); 
    background: var(--surface-0); 
    padding: 2px 6px; 
    border-radius: 4px; 
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .col-actions { 
    width: 160px; 
    min-width: 160px; 
    text-align: left; 
    flex-shrink: 0; 
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 12px; 
  }

  th.th-actions {
    text-align: left;
  }

  .cell-json { font-family: var(--font-mono); color: var(--text-muted); font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0, 0, 0, 0.015); }

  .pagination-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    background: var(--surface-2);
    padding: .75rem 1rem;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
  }

  .page-info { font-size: 13px; color: var(--text-secondary); }
  .page-controls { display: flex; gap: 4px; }

  dialog {
    border: none;
    border-radius: 12px;
    background: var(--surface-2);
    color: var(--text-primary);
    max-width: 580px; 
    width: calc(100% - 2rem);
    margin: auto;
    padding: 1.5rem;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
  }

  dialog::backdrop { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); }
  .modal-header { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; display: block; border-bottom: 0.5px solid var(--border); padding-bottom: .75rem; }
  .modal-title-text { display: block; margin-bottom: 4px; color: var(--text-primary); }
  #modalMeta { display: block; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); word-break: break-all; white-space: normal; line-height: 1.5; }
  .form-container { max-height: 50vh; overflow-y: auto; padding-right: 6px; }
  
  .form-group { 
    margin-bottom: 0.875rem; 
    display: flex;
    flex-direction: row; 
    align-items: center; 
    gap: 6px;                
    width: 100%;
  }

  .form-group label { 
    display: block; font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono);
    line-height: 1.2; word-break: break-all; white-space: normal;   
    width: 90px; min-width: 90px; flex-shrink: 0;        
  }

  .form-group input { 
    flex: 1; width: 100%; padding: 8px 12px; border-radius: var(--radius); 
    border: 0.5px solid var(--border-strong); background: var(--surface-1); 
    color: var(--text-primary); font-size: 14px; font-family: var(--font-sans);
  }

  .form-group input:focus { outline: none; border-color: var(--border-accent); background: var(--surface-2); }
  .error-msg { background: var(--bg-danger); border: 0.5px solid var(--border-danger); border-radius: var(--radius); padding: .75rem 1rem; color: var(--text-danger); font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <h1>JSON Live Table Editor</h1>
  <p class="subtitle">Drag & drop your JSON file below. Edit or delete entries, and save changes directly back onto the source file.</p>

  <div class="drop-zone" id="dropZone" onclick="openFilePicker()">
    <p><span>Click to open</span> or drag and drop a JSON file here</p>
  </div>

  <div class="btn-row">
    <button id="saveBtn" class="btn-success" style="display: none;" onclick="saveBackToFile()">💾 Save Changes to File</button>
    <button id="clearBtn" class="btn-ghost" style="display: none;" onclick="clearAll()">Close File</button>
    <span id="fileStatus" class="file-status" style="display: none;"></span>
  </div>

  <div id="filterPanel" class="search-bar" style="display: none;">
    <div class="search-group">
      <label for="searchQuery">Search text/ID:</label>
      <input type="text" id="searchQuery" placeholder="Type to filter..." oninput="handleFilterChange()">
    </div>
    <div class="search-group">
      <label for="nullFilterSelect">Find Empty/Null Field:</label>
      <select id="nullFilterSelect" onchange="handleFilterChange()">
        <option value="">-- No Empty Filter --</option>
      </select>
    </div>
  </div>

  <div id="editorWorkspace"></div>
</div>

<dialog id="editModal">
  <div class="modal-header">
    <span class="modal-title-text">Modify Entry Attributes</span>
    <span id="modalMeta"></span>
  </div>
  <form id="editForm" method="dialog">
    <div class="form-container" id="formFields"></div>
    <div class="btn-row" style="justify-content: flex-end; margin-top: 1.25rem;">
      <button type="button" class="btn-ghost" onclick="document.getElementById('editModal').close()">Cancel</button>
      <button type="submit" class="btn-primary">Apply Changes</button>
    </div>
  </form>
</dialog>

<script>
const dropZone = document.getElementById('dropZone');
const editModal = document.getElementById('editModal');
const editForm = document.getElementById('editForm');
const saveBtn = document.getElementById('saveBtn');
const clearBtn = document.getElementById('clearBtn');
const filterPanel = document.getElementById('filterPanel');
const searchQuery = document.getElementById('searchQuery');
const nullFilterSelect = document.getElementById('nullFilterSelect');
const fileStatus = document.getElementById('fileStatus');
const workspace = document.getElementById('editorWorkspace');

let fileHandle = null;     
let parsedData = null; 
let isMapMode = false;     
let tableItems = [];       
let tableHeaders = [];     

let currentPage = 1;
const rowsPerPage = 10;

window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (fileHandle) saveBackToFile();
  }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', async e => {
  e.preventDefault(); 
  dropZone.classList.remove('over');
  
  const items = Array.from(e.dataTransfer.items);
  if (items[0] && items[0].kind === 'file') {
    const handle = await items[0].getAsFileSystemHandle();
    if (handle && handle.kind === 'file') {
      fileHandle = handle;
      await loadFileFromHandle();
    }
  }
});

async function openFilePicker() {
  try {
    [fileHandle] = await window.showOpenFilePicker({
      types: [{
        description: 'JSON Files',
        accept: { 'application/json': ['.json'], 'text/plain': ['.txt'] }
      }],
      multiple: false
    });
    await loadFileFromHandle();
  } catch (e) {
    if (e.name !== 'AbortError') renderError('Error reading file natively: ' + e.message);
  }
}

async function loadFileFromHandle() {
  if (!fileHandle) return;
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    
    parsedData = JSON.parse(text);
    currentPage = 1;
    searchQuery.value = '';
    nullFilterSelect.value = '';
    
    fileStatus.innerText = `📄 Active: ${fileHandle.name}`;
    fileStatus.style.display = 'inline-block';
    dropZone.style.display = 'none'; 
    
    processDataStructure();
  } catch (e) {
    renderError('JSON load/parse failed: ' + e.message);
  }
}

async function saveBackToFile() {
  if (!fileHandle || !parsedData) return;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(parsedData, null, 2));
    await writable.close();
    
    const origText = fileStatus.innerText;
    fileStatus.innerText = `✅ Saved Back to ${fileHandle.name}!`;
    setTimeout(() => { fileStatus.innerText = origText; }, 1800);
  } catch (e) {
    alert('Failed to write directly to file: ' + e.message);
  }
}

function clearAll() {
  workspace.innerHTML = '';
  saveBtn.style.display = 'none'; clearBtn.style.display = 'none'; filterPanel.style.display = 'none'; fileStatus.style.display = 'none';
  dropZone.style.display = 'block'; 
  parsedData = null; tableItems = []; tableHeaders = []; fileHandle = null;
}

function processDataStructure() {
  tableItems = [];
  saveBtn.style.display = 'inline-flex';
  clearBtn.style.display = 'inline-flex';
  filterPanel.style.display = 'flex';

  if (Array.isArray(parsedData)) {
    isMapMode = false;
    parsedData.forEach((item, idx) => {
      if (typeof item === 'object' && item !== null) {
        tableItems.push({ _idx: idx, _key: null, _rawRef: item });
      }
    });
  } else if (typeof parsedData === 'object' && parsedData !== null) {
    isMapMode = true;
    Object.entries(parsedData).forEach(([key, item], idx) => {
      if (typeof item === 'object' && item !== null) {
        tableItems.push({ _idx: idx, _key: key, _rawRef: item });
      }
    });
  } else {
    renderError('Unsupported standard JSON roots.');
    return;
  }

  const allKeys = new Set();
  tableItems.forEach(item => {
    Object.keys(item._rawRef).forEach(k => allKeys.add(k));
  });
  tableHeaders = Array.from(allKeys);

  updateNullFilterOptions();
  renderTablePage();
}

function updateNullFilterOptions() {
  nullFilterSelect.innerHTML = '<option value="">-- No Empty Filter --</option>';
  tableHeaders.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h;
    opt.innerText = `Field: ${h}`;
    nullFilterSelect.appendChild(opt);
  });
}

function getFilteredItems() {
  const query = searchQuery.value.trim().toLowerCase();
  const nullFieldTarget = nullFilterSelect.value;

  return tableItems.filter(item => {
    const ref = item._rawRef;
    if (nullFieldTarget) {
      const val = ref[nullFieldTarget];
      const isEmpty = (val === undefined || val === null || String(val).trim() === "");
      if (!isEmpty) return false;
    }
    if (query) {
      if (isMapMode && item._key && item._key.toLowerCase().includes(query)) return true;
      const matchValue = Object.values(ref).some(v => 
        v !== null && v !== undefined && String(v).toLowerCase().includes(query)
      );
      if (!matchValue) return false;
    }
    return true;
  });
}

function handleFilterChange() {
  currentPage = 1;
  renderTablePage();
}

function renderTablePage() {
  const filtered = getFilteredItems();
  const totalRecords = filtered.length;

  if (totalRecords === 0) {
    workspace.innerHTML = '<div class="section-title">Data Explorer Grid</div><div class="error-msg" style="background:var(--surface-1); color:var(--text-secondary); border-color:var(--border)">No matching records found.</div>';
    return;
  }

  const totalPages = Math.ceil(totalRecords / rowsPerPage);
  if (currentPage < 1) currentPage = 1;
  if (currentPage > totalPages) currentPage = totalPages;

  const startIdx = (currentPage - 1) * rowsPerPage;
  const endIdx = Math.min(startIdx + rowsPerPage, totalRecords);
  const pageSlice = filtered.slice(startIdx, endIdx);

  const html = [];
  html.push('<div class="section-title">Data Explorer Grid</div>');
  html.push('<div class="table-container"><table><thead><tr>');
  html.push('<th class="col-idx">#</th>');
  if (isMapMode) html.push('<th class="col-key-th">Key Field</th>');
  tableHeaders.forEach(h => html.push(`<th class="col-data" title="${h}">${h}</th>`));
  html.push('<th class="th-actions" style="width:160px;">Actions</th></tr></thead><tbody>');

  pageSlice.forEach(item => {
    const ref = item._rawRef;
    html.push('<tr>');
    html.push(`<td class="col-idx">${item._idx + 1}</td>`);
    if (isMapMode) html.push(`<td class="col-key-td"><span class="col-hash" title="${item._key}">${item._key}</span></td>`);
    
    tableHeaders.forEach(h => {
      const val = ref[h];
      let displayVal = val !== undefined && val !== null ? val : '';
      let cellClass = 'class="col-data"';
      if (typeof val === 'object') {
        displayVal = JSON.stringify(val);
        cellClass = 'class="col-data cell-json"';
      }
      html.push(`<td ${cellClass} title="${String(displayVal).replace(/"/g, '&quot;')}">${displayVal}</td>`);
    });

    html.push('<td class="col-actions">');
    html.push(`<button class="btn-edit-sm" onclick="openRecordEditor(${item._idx}, '${item._key || ''}')">Edit</button>`);
    html.push(`<button class="btn-danger-sm" onclick="deleteRecord(${item._idx}, '${item._key || ''}')">Delete</button>`);
    html.push('</td>');
    html.push('</tr>');
  });

  html.push('</tbody></table></div>');

  html.push(`
    <div class="pagination-bar">
      <div class="page-info">Showing entries <b>${startIdx + 1}–${endIdx}</b> of <b>${totalRecords}</b></div>
      <div class="page-controls">
        <button class="btn-ghost btn-sm" onclick="setPage(1)" ${currentPage === 1 ? 'disabled' : ''}>« First</button>
        <button class="btn-ghost btn-sm" onclick="setPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>
        <button class="btn-ghost btn-sm" disabled style="color:var(--text-primary); font-weight:600;">Page ${currentPage} / ${totalPages}</button>
        <button class="btn-ghost btn-sm" onclick="setPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>
        <button class="btn-ghost btn-sm" onclick="setPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Last »</button>
      </div>
    </div>
  `);

  workspace.innerHTML = html.join('');
}

function setPage(pageDest) {
  currentPage = pageDest;
  renderTablePage();
}

function deleteRecord(index, key) {
  const identifier = isMapMode ? `Key "${key}"` : `Index #${index + 1}`;
  if (!confirm(`Are you sure you want to delete row [ ${identifier} ] permanently from memory?`)) return;

  if (isMapMode) {
    delete parsedData[key];
  } else {
    parsedData.splice(index, 1);
  }

  processDataStructure();
}

function openRecordEditor(index, key) {
  const itemMatch = tableItems.find(i => isMapMode ? i._key === key : i._idx === index);
  if (!itemMatch) return;
  
  const target = itemMatch._rawRef;
  document.getElementById('modalMeta').innerText = isMapMode ? `Key: ${key}` : `Index: #${index + 1}`;
  
  const fieldsContainer = document.getElementById('formFields');
  fieldsContainer.innerHTML = '';

  Object.entries(target).forEach(([k, v]) => {
    const group = document.createElement('div');
    group.className = 'form-group';
    const label = document.createElement('label');
    label.innerText = k;
    const input = document.createElement('input');
    input.type = 'text';
    input.name = k;
    input.dataset.originIndex = index;
    input.dataset.originKey = key;
    input.value = typeof v === 'object' ? JSON.stringify(v) : (v !== null && v !== undefined ? v : '');

    group.appendChild(label);
    group.appendChild(input);
    fieldsContainer.appendChild(group);
  });

  editModal.showModal();
}

editForm.addEventListener('submit', () => {
  const inputs = editForm.querySelectorAll('input');
  if (inputs.length === 0) return;

  const sampleInput = inputs[0];
  const oIdx = parseInt(sampleInput.dataset.originIndex, 10);
  const oKey = sampleInput.dataset.originKey;

  const itemMatch = tableItems.find(i => isMapMode ? i._key === oKey : i._idx === oIdx);
  if (!itemMatch) return;
  
  const target = itemMatch._rawRef;
  const formData = new FormData(editForm);

  formData.forEach((value, key) => {
    const valTrim = value.trim();
    if ((valTrim.startsWith('{') && valTrim.endsWith('}')) || (valTrim.startsWith('[') && valTrim.endsWith(']'))) {
      try { target[key] = JSON.parse(valTrim); return; } catch (e) {}
    }
    if (valTrim !== '' && !isNaN(valTrim) && Number(valTrim).toString() === valTrim) {
      target[key] = Number(valTrim);
    } else if (valTrim === 'true') { target[key] = true; }
    else if (valTrim === 'false') { target[key] = false; }
    else { target[key] = value; }
  });

  renderTablePage();
});

function renderError(msg) {
  workspace.innerHTML = `<div class="error-msg">${msg}</div>`;
  saveBtn.style.display = 'none';
  clearBtn.style.display = 'none';
  filterPanel.style.display = 'none';
}
</script>
</body>
</html>
