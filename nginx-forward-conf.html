<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Forward Conf Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            background-color: #f5f7fa;
            color: #333;
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            margin-top: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        .code-box-wrapper {
            position: relative;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
        }
        pre {
            margin: 0;
            color: #d4d4d4;
            font-family: "Fira Code", Consolas, Monaco, monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #4a5568;
            color: #fff;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #2d3748;
        }
        .copy-btn.success {
            background: #48bb78;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Nginx Forward Conf Generator</h2>
    
    <div class="input-group">
        <label for="domainInput" style="margin-top: 0;">Target Proxy Domain (without protocol):</label>
        <input type="text" id="domainInput" placeholder="e.g., example.com" value="example.com">
    </div>

    <label>1. Initialize & Edit Configuration (Terminal):</label>
    <div class="code-box-wrapper">
        <button class="copy-btn" id="copyCmdBtn1" onclick="copyText('cmdBlock1', 'copyCmdBtn1')">Copy Code</button>
        <pre id="cmdBlock1">sudo rm -rf /etc/nginx/conf.d/default.conf
sudo touch /etc/nginx/conf.d/default.conf
sudo vim /etc/nginx/conf.d/default.conf</pre>
    </div>

    <label>2. Generated Configuration (Paste into Vim):</label>
    <div class="code-box-wrapper">
        <button class="copy-btn" id="copyConfigBtn" onclick="copyText('codeBlock', 'copyConfigBtn')">Copy Config</button>
        <pre id="codeBlock"></pre>
    </div>

    <label>3. Restart Nginx Service (Terminal):</label>
    <div class="code-box-wrapper">
        <button class="copy-btn" id="copyCmdBtn2" onclick="copyText('cmdBlock2', 'copyCmdBtn2')">Copy Code</button>
        <pre id="cmdBlock2">sudo systemctl stop nginx
sudo systemctl start nginx
sudo systemctl status nginx</pre>
    </div>
</div>

<script>
    const domainInput = document.getElementById('domainInput');
    const codeBlock = document.getElementById('codeBlock');

    // Configuration Template
    const template = `server {
    listen 80;
    server_name _;

    charset utf-8;
    access_log  /var/log/nginx/access.log;

    location / {
        proxy_pass https://{DOMAIN};
        
        proxy_set_header Host {DOMAIN};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect off;
        proxy_ssl_server_name on;
    }
}`;

    // Update the config display dynamically
    function updateConfig() {
        let domain = domainInput.value.trim().replace(/^https?:\/\//i, '');
        domain = domain || 'example.com';
        codeBlock.textContent = template.replace(/{DOMAIN}/g, domain);
    }

    // Copy to clipboard functionality
    function copyText(elementId, btnId) {
        const textToCopy = document.getElementById(elementId).textContent;
        const btn = document.getElementById(btnId);
        const originalText = btn.textContent;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            btn.textContent = 'Copied!';
            btn.classList.add('success');
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('success');
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy: ', err);
            alert('Copy failed. Please manually select and copy the text.');
        });
    }

    // Event listener for user input
    domainInput.addEventListener('input', updateConfig);

    // Initial load
    updateConfig();
</script>

</body>
</html>
