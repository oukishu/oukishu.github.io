<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certbot Command Generator & Copier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            background-color: #f5f7fa;
            color: #333;
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        .code-box-wrapper {
            position: relative;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
        }
        pre {
            margin: 0;
            color: #d4d4d4;
            font-family: "Fira Code", Consolas, Monaco, monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #4a5568;
            color: #fff;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #2d3748;
        }
        .copy-btn.success {
            background: #48bb78;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Certbot DNS Command Generator</h2>
    
    <div class="input-group">
        <label for="domainInput">Enter your domain:</label>
        <input type="text" id="domainInput" placeholder="e.g., example.com" value="example.com">
    </div>

    <label>Generated Commands:</label>
    <div class="code-box-wrapper">
        <button class="copy-btn" id="copyBtn" onclick="copyCommand()">Copy Commands</button>
        <pre id="codeBlock"></pre>
    </div>
</div>

<script>
    const domainInput = document.getElementById('domainInput');
    const codeBlock = document.getElementById('codeBlock');
    const copyBtn = document.getElementById('copyBtn');

    // Command Template
    const template = `sudo rm -rf /etc/letsencrypt/live
sudo mkdir -p /etc/letsencrypt/live && cd /etc/letsencrypt/live
sudo certbot certonly --manual --preferred-challenges dns -d {DOMAIN} --register-unsafely-without-email`;

    // Update command dynamically
    function updateCommand() {
        const domain = domainInput.value.trim() || 'example.com';
        codeBlock.textContent = template.replace('{DOMAIN}', domain);
    }

    // Copy to clipboard functionality
    function copyCommand() {
        const textToCopy = codeBlock.textContent;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            // Visual success feedback
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('success');
            
            // Revert back after 2 seconds
            setTimeout(() => {
                copyBtn.textContent = 'Copy Commands';
                copyBtn.classList.remove('success');
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy: ', err);
            alert('Copy failed. Please manually select and copy the text.');
        });
    }

    // Event listener for the input field
    domainInput.addEventListener('input', updateCommand);

    // Initial load
    updateCommand();
</script>

</body>
</html>
